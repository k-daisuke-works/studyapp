<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>応用情報技術者試験 96日学習ナビ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="welcome" id="welcome" hidden aria-modal="true" role="dialog" aria-labelledby="welcomeTitle">
 <div class="welcome-card">
  <span class="welcome-logo">📘</span>
  <h1 id="welcomeTitle">学習を始めましょう</h1>
  <p>新しく始めるか、別の端末から学習記録を引き継げます。</p>
  <div class="welcome-actions">
   <button class="welcome-button primary" id="startFresh">新規で学習を始める</button>
   <button class="welcome-button secondary" id="startImport">JSONから引き継ぐ</button>
  </div>
  <small class="welcome-note">学習記録はこのブラウザに自動保存されます。あとからJSONで書き出せます。</small>
  <input id="welcomeImportFile" type="file" accept="application/json,.json" hidden>
 </div>
</section>
<div id="loading" class="loading-overlay">
 <div class="loading-spinner"></div>
 <p class="loading-text">データを読み込み中…</p>
</div>
<div class="app" id="app" hidden>
 <div class="sticky-header">
  <header class="hero">
   <h1>応用情報技術者試験｜96日学習ナビ</h1>
   <div class="progress-row"><span id="progressText">カード 0件評価</span><strong id="progressPct">0%</strong></div>
   <div class="progress"><i id="progressBar"></i></div>
  </header>
  <nav class="tabs" aria-label="画面切替">
  <button class="tab active" data-tab="today">今日の学習</button>
  <button class="tab" data-tab="all">全96テーマ</button>
  <button class="tab" data-tab="calc">計算公式集</button>
  <button class="tab" data-tab="afternoon">午後対策</button>
  <button class="tab" data-tab="official">公式細目</button>
 </nav>
 </div>
 <main>
  <section class="panel active" id="today"></section>
  <section class="panel" id="all"></section>
  <section class="panel" id="calc"></section>
  <section class="panel" id="afternoon"></section>
  <section class="panel" id="official"></section>
 </main>
</div>
<script src="app.js"></script>
</body>
</html>
